
services:
  postgres:
    image: postgres:15
    container_name: trainer-postgres
    environment:
      POSTGRES_DB: trainer_db
      POSTGRES_USER: trainer
      POSTGRES_PASSWORD: trainer123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainer -d trainer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: trainer-app
    ports:
      - "8888:8888"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/trainer_db
      DB_USER: trainer
      DB_PASSWORD: trainer123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: